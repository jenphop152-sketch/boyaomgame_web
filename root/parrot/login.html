<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <title>Admin Login - รัฐบาลสาธารณรัฐนกแก้ว</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <!-- ใส่ favicon -->
  <link rel="icon" type="image/png" href="https://www.keroro.com/image/img_special/230801.jpg">
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded shadow-md w-full max-w-sm">
    <h1 class="text-2xl font-bold text-blue-900 text-center mb-6">เข้าสู่ระบบ (Admin)</h1>
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-gray-700 text-sm mb-1">ชื่อผู้ใช้</label>
        <input type="text" id="username" class="w-full border p-2 rounded" required>
      </div>
      <div>
        <label class="block text-gray-700 text-sm mb-1">รหัสผ่าน</label>
        <input type="password" id="password" class="w-full border p-2 rounded" required>
      </div>
      <button type="submit"
        class="w-full bg-blue-900 text-white p-2 rounded font-bold hover:bg-blue-800 transition">เข้าสู่ระบบ</button>
      <p id="error-msg" class="text-red-500 text-sm text-center hidden">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</p>
    </form>
    <div class="mt-4 text-center">
      <a href="index.html" class="text-sm text-gray-500 hover:underline">กลับหน้าหลัก</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = 'admin.html';
        } else {
          document.getElementById('error-msg').classList.remove('hidden');
        }
      } catch (err) {
        alert('Error logging in');
      }
    });
  </script>
</body>

</html>
