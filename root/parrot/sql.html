<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>SQL Manager - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
      table, th, td { border: 1px solid #e2e8f0; border-collapse: collapse; }
      th, td { padding: 0.5rem; text-align: left; }
      th { background-color: #f8fafc; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">
  <!-- Nav -->
  <nav class="bg-blue-900 text-white p-4 shadow flex flex-col sm:flex-row items-center sm:items-start justify-center sm:justify-start">
    <div class="flex flex-col sm:flex-row items-center sm:space-x-4 text-center sm:text-left">
        <h1 class="text-xl font-bold mb-2 sm:mb-0">SQL Manager</h1>
        <a href="admin.html" class="hover:underline text-sm opacity-80">&larr; กลับหน้า Admin</a>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto mt-8 p-4 bg-white rounded shadow">
    <h2 class="text-2xl font-bold text-gray-700 mb-4">รันคำสั่ง SQL (ระวังในการใช้งาน)</h2>
    <form id="sqlForm" class="space-y-4">
      <textarea id="query" rows="5" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm" placeholder="SELECT * FROM posts"></textarea>
      <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded font-bold hover:bg-indigo-700 transition">Execute Query</button>
    </form>
    
    <div class="mt-8">
        <h3 class="font-bold text-gray-700 mb-2">ผลลัพธ์ (Result)</h3>
        <p id="error-msg" class="text-red-600 font-bold hidden"></p>
        <p id="success-msg" class="text-green-600 font-bold hidden"></p>
        <div class="overflow-x-auto mt-4">
            <table id="resultTable" class="w-full hidden text-sm">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
  </div>

  <script>
    fetch('/api/check-auth')
        .then(res => res.json())
        .then(data => { if(!data.authenticated) window.location.href = 'login.html'; });

    document.getElementById('sqlForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const query = document.getElementById('query').value;
        const err = document.getElementById('error-msg');
        const suc = document.getElementById('success-msg');
        const tbl = document.getElementById('resultTable');
        const thd = document.getElementById('tableHead');
        const tbd = document.getElementById('tableBody');
        
        err.classList.add('hidden');
        suc.classList.add('hidden');
        tbl.classList.add('hidden');
        thd.innerHTML = '';
        tbd.innerHTML = '';

        try {
            const res = await fetch('/api/sql', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            });
            const data = await res.json();
            
            if (data.success) {
                if (data.type === 'select') {
                    if (data.data.length > 0) {
                        tbl.classList.remove('hidden');
                        const keys = Object.keys(data.data[0]);
                        thd.innerHTML = `<tr>${keys.map(k => `<th>${k}</th>`).join('')}</tr>`;
                        tbd.innerHTML = data.data.map(row => `<tr>${keys.map(k => `<td class="max-w-xs truncate" title="${row[k]}">${row[k]}</td>`).join('')}</tr>`).join('');
                        suc.textContent = `Found ${data.data.length} rows.`;
                    } else {
                        suc.textContent = `Query executed. 0 rows returned.`;
                    }
                } else {
                    suc.textContent = `Query executed. Changes: ${data.changes}, Last ID: ${data.lastID || 'N/A'}`;
                }
                suc.classList.remove('hidden');
            } else {
                err.textContent = "Error: " + data.error;
                err.classList.remove('hidden');
            }
        } catch(e) {
            err.textContent = "Request failed.";
            err.classList.remove('hidden');
        }
    });
  </script>
</body>
</html>
