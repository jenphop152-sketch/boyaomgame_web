<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โพสต์ - รัฐบาลนกแก้วตะวันตก</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
     <!-- ใส่ favicon -->
  <link rel="icon" type="image/png" href="https://www.keroro.com/image/img_special/230801.jpg">
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen">
  <nav class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
        <a href="index.html" class="flex items-center text-xl font-bold text-blue-900">&larr; กลับหน้าหลัก</a>
    </div>
  </nav>

  <section class="max-w-4xl mx-auto p-4 flex-grow w-full mt-8">
    <div id="post-container" class="bg-white p-8 rounded shadow min-h-full">
        <p class="text-gray-500">กำลังโหลด...</p>
    </div>
  </section>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');
    const container = document.getElementById('post-container');

    if (postId) {
        fetch(`/api/posts/${postId}`)
            .then(res => res.json())
            .then(data => {
                if (data.post) {
                    const p = data.post;
                    document.title = p.title + " - รัฐบาลนกแก้วตะวันตก";
                    container.innerHTML = `
                        <h1 class="text-3xl font-bold text-blue-900 mb-2">${p.title}</h1>
                        <p class="text-gray-500 text-sm mb-6 border-b pb-4">เผยแพร่เมื่อ: ${p.date}</p>
                        <div class="prose max-w-none text-gray-800 whitespace-pre-line leading-relaxed">
                            ${p.content}
                        </div>
                    `;
                } else {
                    container.innerHTML = '<p class="text-red-500 text-center text-xl">ไม่พบข่าวนี้ หรือถูกลบไปแล้ว</p>';
                }
            })
            .catch(err => {
                container.innerHTML = '<p class="text-red-500 text-center">เกิดข้อผิดพลาดในการดึงข้อมูล</p>';
            });
    } else {
        container.innerHTML = '<p class="text-red-500 text-center">ไม่พบรหัสข่าว</p>';
    }
  </script>
</body>
</html>
