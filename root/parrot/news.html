<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ข่าวรัฐบาล - รัฐบาลสาธารณรัฐนกแก้ว</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <!-- ใส่ favicon -->
  <link rel="icon" type="image/png" href="https://www.keroro.com/image/img_special/230801.jpg">
</head>

<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen">

  <nav class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex flex-col md:flex-row justify-between py-4 items-center">
        <div class="flex items-center">
          <span class="text-xl font-bold text-blue-900 text-center">รัฐบาลสาธารณรัฐนกแก้ว</span>
        </div>
        <ul class="flex flex-wrap justify-center space-x-4 md:space-x-6 mt-4 md:mt-0 text-blue-900 font-semibold text-sm md:text-base">
          <li><a href="index.html" class="hover:underline">หน้าหลัก</a></li>
          <li><a href="news.html" class="underline border-b-2 border-blue-900 pb-1">ข่าวรัฐบาล</a></li>
          <li><a href="policies.html" class="hover:underline">นโยบาย</a></li>
          <li><a href="contact.html" class="hover:underline">ติดต่อเรา</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="max-w-5xl mx-auto p-4 flex-grow w-full mt-8">
    <h1 class="text-3xl font-bold text-blue-900 mb-6 border-b pb-2">ข่าวประชาสัมพันธ์ทั้งหมด</h1>
    <div id="full-news-container" class="space-y-4">
      <p class="text-gray-500">กำลังโหลดข่าว...</p>
    </div>
  </section>

  <footer class="bg-blue-900 text-white py-6 mt-8">
    <div class="max-w-7xl mx-auto text-center text-sm">©Boyaomgame พ.ศ. 2569
    </div>
  </footer>

  <script>
    fetch('/api/posts')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('full-news-container');
        container.innerHTML = '';
        if (data.posts && data.posts.length > 0) {
          data.posts.forEach(post => {
            container.innerHTML += `
                  <div class="bg-white p-6 shadow rounded transition hover:shadow-lg">
                    <h3 class="font-bold text-xl text-blue-800">${post.title}</h3>
                    <p class="text-sm text-gray-500 mb-2">${post.date}</p>
                    <p class="text-gray-700">${post.summary}</p>
                    <a href="post.html?id=${post.id}" class="text-blue-600 font-medium hover:underline mt-4 inline-block">อ่านต่อ &rarr;</a>
                  </div>
                  `;
          });
        } else {
          container.innerHTML = '<p class="text-gray-500">ยังไม่มีข่าวในขณะนี้</p>';
        }
      });
  </script>
</body>

</html>
