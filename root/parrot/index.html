<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoyAomGame's stuff</title>
    <!-- Modern Inter font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Sleek dark mode palette */
            --bg-color: #0f172a;
            /* Slate 900 */
            --text-color: #f8fafc;
            /* Slate 50 */
            --text-muted: #94a3b8;
            /* Slate 400 */
            --accent-color: #38bdf8;
            /* Sky 400 */
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-hover: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            /* Subtle radial gradient for depth */
            background-image: radial-gradient(circle at top center, rgba(56, 189, 248, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            width: 100%;
            box-sizing: border-box;
            animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.125rem;
            color: var(--text-muted);
            margin-top: 0;
            margin-bottom: 3.5rem;
            font-weight: 400;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
        }

        .service-link {
            position: relative;
            display: block;
            padding: 1.125rem 1.5rem;
            background-color: var(--card-bg);
            color: var(--text-color);
            text-decoration: none;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            overflow: hidden;
            /* Staggered animation for links */
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Stagger the animation delays for a nice cascade effect */
        .service-link:nth-child(1) {
            animation-delay: 0.2s;
        }

        .service-link:nth-child(2) {
            animation-delay: 0.3s;
        }

        .service-link:nth-child(3) {
            animation-delay: 0.4s;
        }

        .service-link:nth-child(4) {
            animation-delay: 0.5s;
        }

        .service-link:nth-child(5) {
            animation-delay: 0.6s;
        }

        .service-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .service-link:hover {
            background-color: var(--card-hover);
            transform: translateY(-4px) scale(1.02);
            border-color: var(--accent-color);
            color: var(--accent-color);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04), 0 0 15px rgba(56, 189, 248, 0.1);
        }

        .service-link:hover::before {
            transform: translateX(100%);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }

            .links-container {
                gap: 0.875rem;
            }

            .service-link {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Hi, Welcome to BoyAomGame's stuff</h1>
        <p class="subtitle">You might be looking for this</p>

        <div class="links-container">
            <a href="#" class="service-link">Parrot Page (working in progress)</a>
        </div>
    </div>
</body>

</html>
