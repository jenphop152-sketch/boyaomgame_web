<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">
  
  <nav class="bg-blue-900 text-white p-4 shadow flex justify-between items-center">
    <h1 class="text-xl font-bold">ระบบจัดการข่าวซื่อ (Admin)</h1>
    <div>
        <a href="sql.html" class="hover:underline mr-4" style="color: #93c5fd;">SQL Manager</a>
        <a href="index.html" class="hover:underline mr-4" target="_blank">ดูหน้าเว็บไซต์</a>
        <button id="logoutBtn" class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded">ออกจากระบบ</button>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto mt-8 p-4 bg-white rounded shadow">
    <h2 class="text-2xl font-bold text-gray-700 mb-6 border-b pb-2">เขียนข่าวใหม่</h2>
    <form id="postForm" class="space-y-4">
      <div>
        <label class="block text-gray-700 font-bold mb-1">หัวข้อข่าว</label>
        <input type="text" id="title" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
      </div>
      <div>
        <label class="block text-gray-700 font-bold mb-1">วันที่</label>
        <input type="text" id="date" placeholder="เช่น 24 พฤษภาคม 2568" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
      </div>
      <div>
        <label class="block text-gray-700 font-bold mb-1">เรื่องย่อ (แสดงหน้าแรก)</label>
        <input type="text" id="summary" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required>
      </div>
      <div>
        <label class="block text-gray-700 font-bold mb-1">เนื้อหาข่าวฉบับเต็ม</label>
        <textarea id="content" rows="10" class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" required></textarea>
      </div>
      <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded font-bold hover:bg-green-700 transition w-full text-lg shadow">บันทึกข่าวและเผยแพร่</button>
      <p id="status-msg" class="text-center font-bold"></p>
    </form>
  </div>

  <script>
    // Security check immediately on load
    fetch('/api/check-auth')
        .then(res => res.json())
        .then(data => {
            if(!data.authenticated) {
                window.location.href = 'login.html';
            }
        });

    // Form Submitting
    document.getElementById('postForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const postData = {
            title: document.getElementById('title').value,
            date: document.getElementById('date').value,
            summary: document.getElementById('summary').value,
            content: document.getElementById('content').value
        };
        
        try {
            const res = await fetch('/api/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(postData)
            });
            const data = await res.json();
            const msg = document.getElementById('status-msg');
            if (data.success) {
                msg.textContent = "เผยแพร่ข่าวสำเร็จแล้ว!";
                msg.className = "text-center font-bold text-green-600 mt-4";
                document.getElementById('postForm').reset();
            } else {
                msg.textContent = "เกิดข้อผิดพลาด: " + data.error;
                msg.className = "text-center font-bold text-red-600 mt-4";
            }
        } catch(err) {
            alert('Error posting');
        }
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = 'login.html';
    });
  </script>
</body>
</html>
